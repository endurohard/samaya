<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Загрузка анализов — Samaya</title>
  <link rel="stylesheet" href="/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* Токены палитры/шкал — в tokens.css (--card-bg — алиас на --card). */
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    .logo { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 28px; letter-spacing: -0.02em; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .card-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 22px; }
    .client-name { color: var(--primary); }
    .error-msg { color: var(--danger); font-size: 14px; margin-top: 12px; }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      margin-bottom: 18px;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: var(--primary-soft); }
    .upload-zone-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-zone-text { font-size: 14px; color: var(--text-dim); }
    .upload-zone-hint { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    input[type="file"] { display: none; }
    .files-list { display: flex; flex-direction: column; gap: 8px; }
    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 13px;
    }
    .file-icon { font-size: 20px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .file-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-open {
      font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: #fff; color: var(--text); cursor: pointer; text-decoration: none;
      display: inline-block; transition: background .12s;
    }
    .btn-open:hover { background: var(--bg); }
    .btn-del {
      font-size: 12px; padding: 4px 8px; border-radius: 6px; border: none;
      background: none; color: var(--text-dim); cursor: pointer; transition: color .12s;
    }
    .btn-del:hover { color: var(--danger); }
    .empty-state { color: var(--text-dim); font-size: 13px; text-align: center; padding: 16px 0; }
    .section-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
    .uploading-bar {
      font-size: 13px; color: var(--primary); display: flex; align-items: center; gap: 8px;
      padding: 8px 0; display: none;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--primary-soft); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { height: 1px; background: var(--border); margin: 22px 0; }
  </style>
</head>
<body>
  <div class="logo">samaya</div>

  <div class="card" id="mainCard">
    <div id="loading" class="empty-state">Загрузка…</div>
    <div id="content" hidden>
      <div class="card-title">Загрузка анализов</div>
      <div class="card-subtitle">Для клиента: <span class="client-name" id="clientName"></span></div>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-zone-icon">📎</div>
        <div class="upload-zone-text">Нажмите или перетащите файлы сюда</div>
        <div class="upload-zone-hint">PDF, JPG, PNG, WEBP — до 15 МБ каждый</div>
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.webp,.gif" multiple />
      </div>

      <div class="uploading-bar" id="uploadingBar">
        <div class="spinner"></div>
        <span id="uploadingMsg">Загрузка…</span>
      </div>

      <div class="divider"></div>

      <div class="section-title">Загруженные файлы</div>
      <div class="files-list" id="filesList">
        <div class="empty-state">Файлов пока нет</div>
      </div>
    </div>
    <div id="errorState" hidden class="error-msg"></div>
  </div>

  <script>
    const API = '/api/clients/portal';
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    const $ = (id) => document.getElementById(id);

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' Б';
      if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' КБ';
      return (bytes / (1024 * 1024)).toFixed(1) + ' МБ';
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
    }

    function renderFiles(files) {
      const list = $('filesList');
      if (!files.length) {
        list.innerHTML = '<div class="empty-state">Файлов пока нет</div>';
        return;
      }
      list.innerHTML = files.map((f) => {
        const isImage = f.mime_type?.startsWith('image/');
        const icon = f.mime_type === 'application/pdf' ? '📄' : (isImage ? '🖼' : '📎');
        const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
        return `<div class="file-row">
          <span class="file-icon">${icon}</span>
          <div class="file-info">
            <div class="file-name">${esc(f.file_name)}</div>
            <div class="file-meta">${formatSize(f.file_size)} · ${formatDate(f.created_at)}</div>
          </div>
          <div class="file-actions">
            <a class="btn-open" href="${API}/${token}/files/${f.id}" target="_blank">Открыть</a>
            <button class="btn-del" data-fid="${f.id}" title="Удалить">✕</button>
          </div>
        </div>`;
      }).join('');
      list.querySelectorAll('.btn-del').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if (!confirm('Удалить файл?')) return;
          await fetch(`${API}/${token}/files/${btn.dataset.fid}`, { method: 'DELETE' });
          load();
        });
      });
    }

    async function load() {
      if (!token) {
        $('loading').hidden = true;
        $('errorState').hidden = false;
        $('errorState').textContent = 'Ссылка недействительна. Попросите мастера выслать новую.';
        return;
      }
      const r = await fetch(`${API}/${token}`);
      if (!r.ok) {
        $('loading').hidden = true;
        $('errorState').hidden = false;
        $('errorState').textContent = 'Ссылка не найдена или устарела.';
        return;
      }
      const data = await r.json();
      $('loading').hidden = true;
      $('content').hidden = false;
      $('clientName').textContent = data.client?.full_name || '';
      renderFiles(data.files || []);
    }

    async function uploadFiles(files) {
      const MAX = 15 * 1024 * 1024;
      const bar = $('uploadingBar');
      const msg = $('uploadingMsg');
      bar.style.display = 'flex';
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        msg.textContent = `Загрузка ${i + 1}/${files.length}: ${file.name}`;
        if (file.size > MAX) { alert(`"${file.name}" слишком большой (макс. 15 МБ)`); continue; }
        const reader = new FileReader();
        const data_base64 = await new Promise((res, rej) => {
          reader.onload = () => res(reader.result.split(',')[1]);
          reader.onerror = rej;
          reader.readAsDataURL(file);
        });
        await fetch(`${API}/${token}/files`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file_name: file.name, mime_type: file.type, data_base64 }),
        });
      }
      bar.style.display = 'none';
      load();
    }

    // Upload zone click
    $('uploadZone').addEventListener('click', () => $('fileInput').click());
    $('fileInput').addEventListener('change', (e) => {
      const files = Array.from(e.target.files || []);
      e.target.value = '';
      if (files.length) uploadFiles(files);
    });

    // Drag & drop
    $('uploadZone').addEventListener('dragover', (e) => { e.preventDefault(); $('uploadZone').classList.add('dragover'); });
    $('uploadZone').addEventListener('dragleave', () => $('uploadZone').classList.remove('dragover'));
    $('uploadZone').addEventListener('drop', (e) => {
      e.preventDefault();
      $('uploadZone').classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files);
      if (files.length) uploadFiles(files);
    });

    load();
  </script>
</body>
</html>
