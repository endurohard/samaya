server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/snippets/security-headers.conf;

  # Разрешаем крупные тела (загрузка видео-превью услуг через /api/).
  client_max_body_size 320m;

  # Все /api/* проксируются в Kong по внутренней сети,
  # чтобы фронт обращался same-origin (без CORS-проблем).
  location /api/ {
    proxy_pass http://kong:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_request_buffering off;
  }

  # Видео-превью услуг — статика из общего volume, nginx сам поддерживает Range
  # (перемотка/стриминг). Отдельная локация, чтобы не попадать в SPA-fallback.
  location /media/ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # Виджет встраивается в чужие сайты — разрешаем iframe откуда угодно.
  location ~ ^/widget\.(html|js|css)$ {
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors *" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # SPA fallback — отдаём index.html на все неизвестные пути.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Хешированные бандлы (app.<hash>.js, style.<hash>.css) — иммутабельны.
  location ~* "\.[A-Z0-9]+\.(js|css)$" {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # HTML и остальная статика — не кэшировать (ссылается на хеши).
  location ~* \.html$ {
    include /etc/nginx/snippets/security-headers.conf;
    add_header Cache-Control "no-cache, must-revalidate";
  }
}
