# Общие security-заголовки. Подключается include'ом в каждый location,
# где есть свой add_header (nginx отменяет наследование add_header).
# 'unsafe-inline' вынужденно: index/book/portal/review содержат инлайн-скрипты
# (убрать после выноса инлайна в модули — Этап 4 рефакторинга).
# Google Fonts разрешены явно: index.html подключает Golos Text и Fraunces со
# шрифтового CDN, без этих источников CSP блокировал таблицу стилей и весь
# интерфейс откатывался на системный шрифт.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
