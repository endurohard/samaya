# Общие security-заголовки. Подключается include'ом в каждый location,
# где есть свой add_header (nginx отменяет наследование add_header).
# 'unsafe-inline' вынужденно: index/book/portal/review содержат инлайн-скрипты
# (убрать после выноса инлайна в модули — Этап 4 рефакторинга).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
